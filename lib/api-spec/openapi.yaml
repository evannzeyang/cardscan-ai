openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sheets
    description: Google Sheets operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sheets/append:
    post:
      operationId: appendToSheet
      tags: [sheets]
      summary: Append a row to the BCoC Members Google Sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendSheetRowBody"
      responses:
        "200":
          description: Row appended successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppendSheetRowResponse"
        "500":
          description: Failed to append row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppendSheetRowResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AppendSheetRowBody:
      type: object
      properties:
        businessName:
          type: string
        businessAddress:
          type: string
        city:
          type: string
        province:
          type: string
        fullCivicAddress:
          type: string
        latitude:
          type: string
        longitude:
          type: string
      required:
        - businessName
        - businessAddress
        - city
        - province
        - fullCivicAddress
        - latitude
        - longitude
    AppendSheetRowResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
